spring.application.name=dms-backend
server.port=8081

spring.datasource.url=jdbc:postgresql://pg-23fe8501-anujawij-8f00.l.aivencloud.com:16850/DMS
spring.datasource.username=avnadmin
spring.datasource.password=

# Aiven requires SSL
spring.datasource.hikari.data-source-properties.sslmode=require

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Multipart limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Upload directory (can be relative or absolute)
app.upload.dir=uploads
# Optional: max bytes (fallback 100MB)
app.upload.max-bytes=104857600

# HikariCP connection pool (Spring Boot auto-configures Hikari as the DataSource)
spring.datasource.hikari.pool-name=DMSHikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1